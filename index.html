<!-- CoachOS v1.3 — 업무 트래킹 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachOS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F7F5;--surface:#FFFFFF;--surface2:#F2F2F0;--surface3:#EBEBEA;
  --border:#E4E4E2;--border2:#D4D4D2;
  --text:#1A1A18;--text-mid:#6B6B68;--text-dim:#A8A8A5;
  --accent:#3B6B8A;--accent-l:#EBF2F7;--accent-d:#2A4F68;
  --ok:#3A7D5A;--ok-l:#EBF5EF;
  --warn:#8A6B2A;--warn-l:#F5F0E8;
  --danger:#8A3B3B;--danger-l:#F5EBEB;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;}
input,select,textarea,button{font-family:var(--sans);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:640px){.hide-sm{display:none!important;}.two-col{grid-template-columns:1fr!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── 상수 ── */
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyOWrQXtFfGWcnw0VkcsDau81r1JFgcYwgHBxg6E5I93GocHPdfUyYJuuke5tb_alZP/exec";
const VERSION="v1.3";
const DEFAULT_MODEL="gemini-2.0-flash";
const GEMINI_KEY_LS="coachos_gkey";
const GEMINI_MODEL_LS="coachos_gmodel";
const COACH_PW="coach1234";

/* ── 기본 업무 카테고리 ── */
const DEFAULT_CATEGORIES=[
  {id:"cat_coaching", name:"코칭 세션",  color:"#3B6B8A"},
  {id:"cat_content",  name:"콘텐츠 제작",color:"#8A6B2A"},
  {id:"cat_funnel",   name:"퍼널/영업",  color:"#3A7D5A"},
  {id:"cat_learning", name:"학습/성장",  color:"#6B3B8A"},
  {id:"cat_admin",    name:"행정/기타",  color:"#6B6B68"},
];

/* ── 날짜 유틸 ── */
function getToday(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function getWeekStart(dateStr){
  const d=new Date(dateStr);
  const day=d.getDay();
  d.setDate(d.getDate()+(day===0?-6:1-day));
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function getWeekDates(weekStart){
  return Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);d.setDate(d.getDate()+i);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  });
}
function getLast7Days(){
  return Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  });
}
const DAY_KR=["일","월","화","수","목","금","토"];
const TODAY=getToday();

function getDayOfWeek(dateStr){
  const [y,m,d]=dateStr.split("-").map(Number);
  return new Date(y,m-1,d).getDay();
}
function calcWorkTotal(start,end){
  if(!start||!end)return "";
  const [sh,sm]=start.split(":").map(Number);
  const [eh,em]=end.split(":").map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0)mins+=1440;
  const h=Math.floor(mins/60),m=mins%60;
  return h+"시간"+(m>0?" "+m+"분":"");
}

const TIME_OPTS=(()=>{
  const opts=[];
  for(let h=6;h<=23;h++){
    opts.push(String(h).padStart(2,"0")+":00");
    opts.push(String(h).padStart(2,"0")+":30");
  }
  return opts;
})();

/* ── Google Sheets ── */
async function sheetGet(sheet){
  const r=await fetch(SCRIPT_URL+"?sheet="+encodeURIComponent(sheet));
  if(!r.ok)throw new Error("sheetGet 실패: "+r.status);
  return (await r.json()).data||[];
}
async function sheetWrite(sheet,row,values){
  const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"write",sheet,row,values})});
  if(!r.ok)throw new Error("sheetWrite 실패: "+r.status);
}
async function sheetDelete(sheet,row){
  const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"delete",sheet,row})});
  if(!r.ok)throw new Error("sheetDelete 실패: "+r.status);
}

/* ── 멤버 저장/로드
   sheet: members
   [name, pin, memo]
── */
async function loadMembers(){
  const rows=await sheetGet("members");
  return rows.filter(r=>r[0]).map(r=>({
    name:String(r[0]),pin:String(r[1]),memo:String(r[2]||"")
  }));
}
async function saveMembers(members, prevCount){
  for(let i=0;i<members.length;i++){
    await sheetWrite("members",i+1,[members[i].name,members[i].pin,members[i].memo||""]);
  }
  // 이전보다 줄었으면 고아 행 삭제
  if(prevCount&&prevCount>members.length){
    for(let i=members.length+1;i<=prevCount;i++){
      await sheetDelete("members",i);
    }
  }
}
async function deleteMemberRow(rowIdx){
  await sheetDelete("members",rowIdx+1);
}

/* ── 카테고리 저장/로드
   sheet: work_categories
   [id, name, color]
── */
async function loadCategories(){
  const rows=await sheetGet("work_categories");
  if(!rows.length)return DEFAULT_CATEGORIES;
  return rows.filter(r=>r[0]).map(r=>({id:r[0],name:r[1],color:r[2]}));
}
async function saveCategories(cats){
  // 전체 덮어쓰기
  for(let i=0;i<cats.length;i++){
    await sheetWrite("work_categories",i+1,[cats[i].id,cats[i].name,cats[i].color]);
  }
}

/* ── 일일 기록 저장/로드
   sheet: work_records
   [date, JSON(record)]
── */
async function loadRecords(){
  const rows=await sheetGet("work_records");
  const result={};
  rows.filter(r=>r[0]).forEach(r=>{
    try{result[r[0]]=JSON.parse(r[1]);}catch{}
  });
  return result;
}
async function saveRecord(date,record){
  const rows=await sheetGet("work_records");
  const idx=rows.findIndex(r=>r[0]===date);
  if(idx<0)await sheetWrite("work_records",rows.length+1,[date,JSON.stringify(record)]);
  else await sheetWrite("work_records",idx+1,[date,JSON.stringify(record)]);
}

/* ── Gemini ── */
async function callGemini(apiKey,prompt,model){
  const url="https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey;
  const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:2048}})});
  if(!res.ok){const t=await res.text();return{raw:"API 오류 "+res.status+": "+t.slice(0,200)};}
  const data=await res.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
  try{const m=text.match(/\{[\s\S]*\}/);return m?JSON.parse(m[0]):{raw:text};}
  catch{return{raw:text};}
}

/* ── 공통 UI ── */
const iStyle={
  background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,
  padding:"8px 12px",fontSize:13,color:"var(--text)",outline:"none",
  width:"100%",display:"block",transition:"border-color .15s",
};

function FInput({value,onChange,placeholder,type,style}){
  const composing=useRef(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&!composing.current&&ref.current.value!==String(value||""))
      ref.current.value=String(value||"");
  },[value]);
  return(
    <input ref={ref} type={type||"text"} defaultValue={value||""}
      placeholder={placeholder||""}
      onCompositionStart={()=>composing.current=true}
      onCompositionEnd={e=>{composing.current=false;onChange(e.target.value);}}
      onChange={e=>{if(!composing.current)onChange(e.target.value);}}
      onFocus={e=>e.target.style.borderColor="var(--accent)"}
      onBlur={e=>e.target.style.borderColor="var(--border)"}
      style={Object.assign({},iStyle,style||{})}/>
  );
}

function Btn({children,onClick,variant,size,disabled,full,style}){
  const v=variant||"primary";
  const sz=size==="sm"?{padding:"5px 12px",fontSize:12}:size==="xs"?{padding:"3px 8px",fontSize:11}:{padding:"9px 20px",fontSize:13};
  const colors={
    primary:{background:"var(--accent)",color:"#fff",border:"none"},
    outline:{background:"transparent",color:"var(--accent)",border:"1px solid var(--accent)"},
    ghost:{background:"transparent",color:"var(--text-mid)",border:"none"},
    danger:{background:"var(--danger)",color:"#fff",border:"none"},
    subtle:{background:"var(--surface2)",color:"var(--text)",border:"1px solid var(--border)"},
  };
  return(
    <button onClick={onClick} disabled={disabled}
      style={Object.assign({},sz,colors[v],{borderRadius:7,cursor:disabled?"not-allowed":"pointer",
        fontWeight:500,opacity:disabled?0.45:1,width:full?"100%":undefined,
        transition:"opacity .15s"},style||{})}>
      {children}
    </button>
  );
}

function Card({children,style}){
  return(
    <div style={{background:"var(--surface)",borderRadius:12,border:"1px solid var(--border)",
      padding:18,...(style||{})}}>{children}</div>
  );
}

function Spinner(){
  return<div style={{textAlign:"center",padding:48,color:"var(--text-dim)",fontSize:13}}>불러오는 중…</div>;
}

function Confirm({msg,onOk,onCancel}){
  return(
    <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
      <span style={{fontSize:11,color:"var(--danger)"}}>{msg||"삭제할까요?"}</span>
      <Btn size="xs" variant="danger" onClick={onOk}>확인</Btn>
      <Btn size="xs" variant="ghost" onClick={onCancel}>취소</Btn>
    </span>
  );
}

/* ── 슬라이더 ── */
function ScoreSlider({label,value,onChange,color}){
  const c=value>=7?(color||"var(--ok)"):value>=4?"var(--warn)":"var(--danger)";
  return(
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:12,color:"var(--text-mid)",minWidth:56,flexShrink:0}}>{label}</span>
      <input type="range" min={1} max={10} value={value}
        onChange={e=>onChange(Number(e.target.value))}
        style={{flex:1,accentColor:c,height:3}}/>
      <span style={{fontSize:14,fontWeight:600,color:c,minWidth:16,textAlign:"right"}}>{value}</span>
    </div>
  );
}

/* ── 업무 항목 폼 ── */
function WorkItemForm({categories,initial,onSave,onCancel,label}){
  const [catId,setCatId]=useState((initial&&initial.catId)||categories[0]?.id||"");
  const [sets,setSets]=useState((initial&&initial.sets)||1);
  const [focus,setFocus]=useState((initial&&initial.focus)||7);
  const [satisfy,setSatisfy]=useState((initial&&initial.satisfy)||7);
  const [note,setNote]=useState((initial&&initial.note)||"");

  const cat=categories.find(c=>c.id===catId);

  return(
    <div style={{background:"var(--surface2)",borderRadius:10,padding:14,
      border:"1px solid var(--border)",marginBottom:10}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:12}}>
        <div>
          <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>업무 카테고리</div>
          <select value={catId} onChange={e=>setCatId(e.target.value)}
            style={Object.assign({},iStyle,{color:"var(--text)"})}>
            {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>세트 수</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>setSets(Math.max(1,sets-1))}
              style={{width:28,height:28,borderRadius:6,border:"1px solid var(--border)",
                background:"var(--surface)",cursor:"pointer",fontSize:16,color:"var(--text-mid)"}}>−</button>
            <span style={{fontSize:16,fontWeight:600,color:cat?.color||"var(--accent)",
              minWidth:24,textAlign:"center"}}>{sets}</span>
            <button onClick={()=>setSets(sets+1)}
              style={{width:28,height:28,borderRadius:6,border:"1px solid var(--border)",
                background:"var(--surface)",cursor:"pointer",fontSize:16,color:"var(--text-mid)"}}>+</button>
          </div>
          <div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,textAlign:"center"}}>
            {sets*20}분
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        <ScoreSlider label="집중도" value={focus} onChange={setFocus} color={cat?.color}/>
        <ScoreSlider label="만족도" value={satisfy} onChange={setSatisfy} color={cat?.color}/>
      </div>
      <div style={{marginBottom:12}}>
        <FInput value={note} onChange={setNote} placeholder="메모 (선택)"
          style={{fontSize:12}}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn size="sm" onClick={()=>onSave({catId,sets,focus,satisfy,note})}>
          {label||"추가"}
        </Btn>
        <Btn size="sm" variant="ghost" onClick={onCancel}>취소</Btn>
      </div>
    </div>
  );
}

/* ── 기록 폼 ── */
function RecordForm({date,record,categories,onSave,onDateChange}){
  const [workStart,setWorkStart]=useState(record?.workStart||"");
  const [workEnd,setWorkEnd]=useState(record?.workEnd||"");
  const [items,setItems]=useState(()=>record?.items?JSON.parse(JSON.stringify(record.items)):[]);
  const [adding,setAdding]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [delIdx,setDelIdx]=useState(null);
  const [memo,setMemo]=useState(record?.memo||"");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const timerRef=useRef(null);

  useEffect(()=>()=>{if(timerRef.current)clearTimeout(timerRef.current);},[]);

  const total=calcWorkTotal(workStart,workEnd);
  const totalSets=items.reduce((s,it)=>s+it.sets,0);

  const handleSave=async()=>{
    setSaving(true);
    try{
      await onSave(date,{workStart,workEnd,workTotal:total,items,memo});
      setSaved(true);
      timerRef.current=setTimeout(()=>setSaved(false),2500);
    }catch(e){alert("저장 실패: "+e.message);}
    finally{setSaving(false);}
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* 날짜 선택 */}
      <div style={{display:"flex",alignItems:"center",gap:12,background:"var(--accent-l)",
        borderRadius:10,padding:"10px 16px"}}>
        <span style={{fontSize:13,fontWeight:600,color:"var(--accent-d)"}}>날짜</span>
        <div style={{position:"relative",flex:1,maxWidth:220}}>
          <input type="date" value={date} max={TODAY}
            onChange={e=>onDateChange(e.target.value)}
            style={Object.assign({},iStyle,{background:"transparent",
              border:"1px solid var(--accent)",color:"transparent",caretColor:"transparent"})}/>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
            fontSize:13,color:"var(--accent-d)",fontWeight:600,pointerEvents:"none"}}>
            {date} ({DAY_KR[getDayOfWeek(date)]})
          </span>
        </div>
        {date===TODAY&&(
          <span style={{fontSize:11,fontWeight:600,color:"var(--accent)",
            background:"var(--accent-l)",borderRadius:20,padding:"2px 10px",
            border:"1px solid var(--accent)"}}>오늘</span>
        )}
      </div>

      {/* 출퇴근 */}
      <Card>
        <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>업무 시간</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:record?.coachComment?0:0}}>
          <div>
            <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>출근</div>
            <select value={workStart} onChange={e=>setWorkStart(e.target.value)}
              style={Object.assign({},iStyle,{color:workStart?"var(--text)":"var(--text-dim)"})}>
              <option value="">시간 선택</option>
              {TIME_OPTS.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>퇴근</div>
            <select value={workEnd} onChange={e=>setWorkEnd(e.target.value)}
              style={Object.assign({},iStyle,{color:workEnd?"var(--text)":"var(--text-dim)"})}>
              <option value="">시간 선택</option>
              {TIME_OPTS.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        </div>
        {total&&(
          <div style={{marginTop:12,display:"flex",justifyContent:"space-between",
            alignItems:"center",padding:"8px 12px",background:"var(--surface2)",borderRadius:8}}>
            <span style={{fontSize:12,color:"var(--text-mid)"}}>총 업무 시간</span>
            <span style={{fontSize:15,fontWeight:600,color:"var(--accent)"}}>{total}</span>
          </div>
        )}
        {totalSets>0&&(
          <div style={{marginTop:6,display:"flex",justifyContent:"space-between",
            alignItems:"center",padding:"6px 12px",background:"var(--surface2)",borderRadius:8}}>
            <span style={{fontSize:12,color:"var(--text-mid)"}}>기록된 세트</span>
            <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>
              {totalSets}세트 ({totalSets*20}분)
            </span>
          </div>
        )}
      </Card>

      {/* 업무 기록 */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:600,fontSize:14}}>업무 기록</div>
          <Btn size="sm" onClick={()=>{setAdding(true);setEditIdx(null);}}>+ 추가</Btn>
        </div>
        {adding&&(
          <WorkItemForm categories={categories}
            onSave={item=>{setItems(p=>[...p,item]);setAdding(false);}}
            onCancel={()=>setAdding(false)}/>
        )}
        {items.map((item,i)=>{
          const cat=categories.find(c=>c.id===item.catId)||{name:"기타",color:"var(--text-dim)"};
          return(
            <div key={i}>
              {editIdx===i?(
                <WorkItemForm categories={categories} initial={item} label="수정 저장"
                  onSave={u=>{setItems(p=>p.map((x,j)=>j===i?u:x));setEditIdx(null);}}
                  onCancel={()=>setEditIdx(null)}/>
              ):(
                <div style={{background:"var(--surface2)",borderRadius:10,padding:"11px 14px",
                  marginBottom:8,border:"1px solid var(--border)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                        <span style={{width:8,height:8,borderRadius:"50%",
                          background:cat.color,flexShrink:0,display:"inline-block"}}/>
                        <span style={{fontSize:13,fontWeight:600}}>{cat.name}</span>
                        <span style={{fontSize:12,color:cat.color,fontWeight:600}}>
                          {item.sets}세트
                        </span>
                        <span style={{fontSize:11,color:"var(--text-dim)"}}>
                          ({item.sets*20}분)
                        </span>
                      </div>
                      <div style={{display:"flex",gap:12,marginBottom:item.note?6:0}}>
                        <span style={{fontSize:11,color:"var(--text-mid)"}}>
                          집중 <b style={{color:"var(--warn)"}}>{item.focus}</b>
                        </span>
                        <span style={{fontSize:11,color:"var(--text-mid)"}}>
                          만족 <b style={{color:"var(--ok)"}}>{item.satisfy}</b>
                        </span>
                      </div>
                      {item.note&&<div style={{fontSize:11,color:"var(--text-dim)"}}>{item.note}</div>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    {delIdx===i
                      ?<Confirm onOk={()=>{setItems(p=>p.filter((_,j)=>j!==i));setDelIdx(null);}}
                          onCancel={()=>setDelIdx(null)}/>
                      :<span>
                        <Btn size="xs" variant="ghost" onClick={()=>{setEditIdx(i);setAdding(false);}}>수정</Btn>
                        {" "}
                        <Btn size="xs" variant="ghost" onClick={()=>setDelIdx(i)}
                          style={{color:"var(--danger)"}}>삭제</Btn>
                      </span>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {items.length===0&&!adding&&(
          <div style={{color:"var(--text-dim)",fontSize:13}}>업무를 추가해주세요</div>
        )}
      </Card>

      {/* 오늘 메모 */}
      <Card>
        <div style={{fontWeight:600,fontSize:14,marginBottom:8}}>오늘 한마디</div>

/* ── 세트 그래프 ── */
function SetsChart({records,dates,categories}){
  const hasData=dates.some(d=>records[d]&&records[d].items&&records[d].items.length);
  if(!hasData)return null;

  const maxSets=Math.max(...dates.map(d=>{
    const r=records[d];
    return r&&r.items?r.items.reduce((s,it)=>s+it.sets,0):0;
  }),1);

  return(
    <Card>
      <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>업무 세트 추이</div>
      <div style={{display:"flex",gap:4,alignItems:"flex-end",height:80}}>
        {dates.map((d,i)=>{
          const r=records[d];
          const totalSets=r&&r.items?r.items.reduce((s,it)=>s+it.sets,0):0;
          const catBreakdown=categories.map(cat=>{
            const n=r&&r.items?r.items.filter(it=>it.catId===cat.id).reduce((s,it)=>s+it.sets,0):0;
            return{cat,n};
          }).filter(x=>x.n>0);
          const h=totalSets>0?Math.max(8,Math.round((totalSets/maxSets)*72)):0;
          const dow=getDayOfWeek(d);
          return(
            <div key={d} style={{flex:1,display:"flex",flexDirection:"column",
              alignItems:"center",gap:3}}>
              <div style={{width:"100%",display:"flex",flexDirection:"column-reverse",
                height:72,justifyContent:"flex-start",gap:1}}>
                {totalSets>0&&catBreakdown.map(({cat,n},ci)=>(
                  <div key={ci} style={{
                    width:"100%",
                    height:Math.max(2,Math.round((n/maxSets)*72))+"px",
                    background:cat.color,borderRadius:ci===catBreakdown.length-1?"3px 3px 0 0":"0",
                    opacity:0.8,
                  }}/>
                ))}
                {totalSets===0&&<div style={{width:"100%",height:"100%"}}/>}
              </div>
              {totalSets>0&&(
                <div style={{fontSize:9,fontWeight:600,color:"var(--text-mid)"}}>{totalSets}</div>
              )}
              <div style={{fontSize:9,color:d===TODAY?"var(--accent)":dow===0?"var(--danger)":dow===6?"var(--accent)":"var(--text-dim)",fontWeight:d===TODAY?600:400}}>
                {DAY_KR[dow]}
              </div>
            </div>
          );
        })}
      </div>
      {/* 범례 */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:10}}>
        {categories.map(cat=>(
          <div key={cat.id} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:cat.color}}/>
            <span style={{fontSize:10,color:"var(--text-dim)"}}>{cat.name}</span>
          </div>
        ))}
      </div>
    </Card>
  );
}

/* ── AI 주간 리포트 ── */
function AIWeeklyReport({records,dates,categories,apiKey,geminiModel}){
  const [report,setReport]=useState(null);
  const [loading,setLoading]=useState(false);

  const gen=async()=>{
    if(!apiKey){alert("API 키를 먼저 입력해주세요.");return;}
    setLoading(true);setReport(null);

    const weekData=dates.map(d=>{
      const r=records[d];if(!r)return null;
      const totalSets=r.items?r.items.reduce((s,it)=>s+it.sets,0):0;
      const catSummary=categories.map(cat=>{
        const items=r.items?r.items.filter(it=>it.catId===cat.id):[];
        if(!items.length)return null;
        return{
          category:cat.name,
          sets:items.reduce((s,it)=>s+it.sets,0),
          avgFocus:+(items.reduce((s,it)=>s+it.focus,0)/items.length).toFixed(1),
          avgSatisfy:+(items.reduce((s,it)=>s+it.satisfy,0)/items.length).toFixed(1),
        };
      }).filter(Boolean);
      return{date:d,workTotal:r.workTotal,totalSets,categories:catSummary,memo:r.memo||null};
    }).filter(Boolean);

    const prompt=`다이어트 코칭 사업자의 주간 업무 패턴을 분석해주세요.

업무 카테고리: ${categories.map(c=>c.name).join(", ")}
세트 = 20분 단위. 집중도/만족도는 1~10점.

[이번 주 데이터]
${JSON.stringify(weekData)}

JSON으로만 답하세요:
{
  "headline": "이번 주 업무 한 줄 총평",
  "best_work": "가장 잘 된 업무 패턴 (집중도/만족도 기준)",
  "drain": "에너지 드레인 구간 (집중↑ 만족↓ 또는 둘 다 낮은 것)",
  "time_pattern": "출퇴근/업무 시간 패턴에서 발견한 것",
  "next_week": "다음 주 업무 배치 제안",
  "highlight": "이번 주 잘 한 것"
}`;

    try{
      const r=await callGemini(apiKey,prompt,geminiModel||DEFAULT_MODEL);
      setReport(r);
    }catch(e){setReport({raw:"오류: "+e.message});}
    finally{setLoading(false);}
  };

  return(
    <Card style={{border:"1px solid var(--ok-l)",background:"var(--ok-l)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:report?14:0}}>
        <div>
          <div style={{fontFamily:"var(--serif)",fontSize:15,color:"var(--ok)"}}>주간 AI 리포트</div>
          <div style={{fontSize:11,color:"var(--text-mid)",marginTop:1}}>업무 패턴 분석</div>
        </div>
        <Btn size="sm" variant="outline" onClick={gen} disabled={loading||!apiKey}
          style={{borderColor:"var(--ok)",color:"var(--ok)"}}>
          {loading?"분석 중…":report?"재분석":"리포트 생성"}
        </Btn>
      </div>
      {!apiKey&&<p style={{fontSize:12,color:"var(--text-dim)",marginTop:8}}>설정에서 API 키를 입력해주세요.</p>}
      {report?.raw&&<p style={{fontSize:12,color:"var(--danger)",marginTop:8,whiteSpace:"pre-wrap"}}>{report.raw}</p>}
      {report&&!report.raw&&(
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:4}}>
          {report.headline&&(
            <div style={{background:"var(--surface)",borderRadius:10,padding:"10px 14px",
              borderLeft:"2px solid var(--ok)"}}>
              <p style={{fontSize:14,color:"var(--text)",fontFamily:"var(--serif)",
                lineHeight:1.5,fontStyle:"italic"}}>"{report.headline}"</p>
            </div>
          )}
          {[
            {k:"highlight",l:"잘 한 것",c:"var(--ok)"},
            {k:"best_work",l:"최고 업무 패턴",c:"var(--accent)"},
            {k:"drain",l:"에너지 드레인",c:"var(--danger)"},
            {k:"time_pattern",l:"시간 패턴",c:"var(--warn)"},
            {k:"next_week",l:"다음 주 제안",c:"var(--text-mid)"},
          ].map(({k,l,c})=>report[k]?(
            <div key={k} style={{borderLeft:"2px solid "+c,paddingLeft:10,borderRadius:0}}>
              <div style={{fontSize:10,fontWeight:600,color:c,marginBottom:2}}>{l}</div>
              <p style={{fontSize:13,color:"var(--text)",lineHeight:1.6}}>{report[k]}</p>
            </div>
          ):null)}
        </div>
      )}
    </Card>
  );
}

/* ── 카테고리 설정 ── */
function CategorySettings({categories,onSave,onClose,saving}){
  const [draft,setDraft]=useState(JSON.parse(JSON.stringify(categories)));
  const [del,setDel]=useState(null);
  const PRESET_COLORS=["#3B6B8A","#8A6B2A","#3A7D5A","#6B3B8A","#6B6B68","#8A3B3B","#2A6B5A","#5A3B8A"];

  const update=(i,k,v)=>setDraft(p=>{const d=[...p];d[i]={...d[i],[k]:v};return d;});
  const add=()=>setDraft(p=>[...p,{id:"cat_"+Date.now(),name:"",color:PRESET_COLORS[p.length%PRESET_COLORS.length]}]);
  const remove=i=>setDraft(p=>p.filter((_,j)=>j!==i));

  return(
    <Card style={{border:"1px solid var(--accent)"}}>
      <div style={{fontFamily:"var(--serif)",fontSize:17,marginBottom:16}}>업무 카테고리 설정</div>
      {draft.map((cat,i)=>(
        <div key={cat.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",gap:4,flexShrink:0}}>
            {PRESET_COLORS.map(c=>(
              <button key={c} onClick={()=>update(i,"color",c)}
                style={{width:18,height:18,borderRadius:"50%",background:c,border:"none",cursor:"pointer",
                  outline:cat.color===c?"2px solid var(--text)":"none",outlineOffset:1}}/>
            ))}
          </div>
          <FInput value={cat.name} onChange={v=>update(i,"name",v)}
            placeholder="카테고리 이름" style={{flex:1,fontSize:12,padding:"6px 10px"}}/>
          {del===i
            ?<Confirm onOk={()=>{remove(i);setDel(null);}} onCancel={()=>setDel(null)}/>
            :<button onClick={()=>setDel(i)} disabled={draft.length<=2}
              style={{background:"none",border:"none",cursor:"pointer",
                color:"var(--danger)",fontSize:15,opacity:draft.length<=2?0.3:0.5,
                flexShrink:0,padding:"0 4px"}}>×</button>}
        </div>
      ))}
      <button onClick={add}
        style={{width:"100%",padding:"8px",border:"1px dashed var(--border2)",
          borderRadius:8,background:"transparent",color:"var(--text-dim)",
          fontSize:12,cursor:"pointer",marginTop:4,marginBottom:14}}>
        + 카테고리 추가
      </button>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={()=>onSave(draft)} disabled={saving||draft.some(c=>!c.name.trim())}>
          {saving?"저장 중…":"저장"}
        </Btn>
        <Btn variant="ghost" onClick={onClose}>취소</Btn>
      </div>
    </Card>
  );
}

/* ── 멤버 관리 ── */
function MemberManager(){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [showForm,setShowForm]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [delIdx,setDelIdx]=useState(null);
  const [draft,setDraft]=useState({name:"",pin:"",memo:""});

  useEffect(()=>{
    loadMembers().then(m=>{setMembers(m);setLoading(false);})
      .catch(e=>{console.error(e);setLoading(false);});
  },[]);

  const openAdd=()=>{
    setDraft({name:"",pin:"",memo:""});
    setEditIdx(null);
    setShowForm(true);
  };

  const openEdit=i=>{
    setDraft({...members[i]});
    setEditIdx(i);
    setShowForm(true);
  };

  const handleSave=async()=>{
    if(saving)return;
    if(!draft.name.trim()){alert("이름을 입력해주세요.");return;}
    if(!draft.pin.trim()){alert("PIN을 입력해주세요.");return;}
    // 중복 이름 체크
    const dup=members.some((m,i)=>m.name===draft.name.trim()&&i!==editIdx);
    if(dup){alert("이미 같은 이름의 멤버가 있어요.");return;}
    setSaving(true);
    try{
      let updated;
      if(editIdx!==null){
        updated=members.map((m,i)=>i===editIdx?{...draft,name:draft.name.trim(),pin:draft.pin.trim()}:m);
      }else{
        updated=[...members,{name:draft.name.trim(),pin:draft.pin.trim(),memo:draft.memo||""}];
      }
      await saveMembers(updated,members.length);
      setMembers(updated);
      setShowForm(false);
      setEditIdx(null);
    }catch(e){alert("저장 실패: "+e.message);}
    finally{setSaving(false);}
  };

  const handleDelete=async i=>{
    setSaving(true);
    try{
      const prevCount=members.length;
      const updated=members.filter((_,j)=>j!==i);
      await saveMembers(updated,prevCount);
      setMembers(updated);
      setDelIdx(null);
    }catch(e){alert("삭제 실패: "+e.message);}
    finally{setSaving(false);}
  };

  if(loading)return<div style={{color:"var(--text-dim)",fontSize:13,padding:20}}>불러오는 중…</div>;

  return(
    <div>
      {showForm&&(
        <Card style={{marginBottom:14,border:"1px solid var(--accent)"}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>
            {editIdx!==null?"멤버 수정":"새 멤버 추가"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>이름 *</div>
              <FInput value={draft.name} onChange={v=>setDraft(p=>({...p,name:v}))} placeholder="이름"/>
            </div>
            <div>
              <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>PIN *</div>
              <FInput value={draft.pin} onChange={v=>setDraft(p=>({...p,pin:v}))} placeholder="PIN 번호" type="password"/>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:4}}>메모 (선택)</div>
            <FInput value={draft.memo} onChange={v=>setDraft(p=>({...p,memo:v}))} placeholder="특이사항, 역할 등"/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn size="sm" onClick={handleSave} disabled={saving}>
              {saving?"저장 중…":editIdx!==null?"수정 저장":"추가"}
            </Btn>
            <Btn size="sm" variant="ghost" onClick={()=>{setShowForm(false);setEditIdx(null);}}>취소</Btn>
          </div>
        </Card>
      )}

      {members.length===0&&!showForm&&(
        <div style={{textAlign:"center",padding:40,color:"var(--text-dim)",fontSize:13}}>
          아직 등록된 멤버가 없어요
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        {members.map((m,i)=>(
          <div key={i} style={{background:"var(--surface2)",borderRadius:10,
            padding:"12px 16px",border:"1px solid var(--border)",
            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{m.name}</div>
              {m.memo&&<div style={{fontSize:11,color:"var(--text-dim)",marginTop:2}}>{m.memo}</div>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {delIdx===i
                ?<Confirm onOk={()=>handleDelete(i)} onCancel={()=>setDelIdx(null)}/>
                :<>
                  <Btn size="xs" variant="ghost" onClick={()=>openEdit(i)}>수정</Btn>
                  <Btn size="xs" variant="ghost" onClick={()=>setDelIdx(i)}
                    style={{color:"var(--danger)"}}>삭제</Btn>
                </>}
            </div>
          </div>
        ))}
      </div>

      {!showForm&&(
        <Btn variant="outline" full onClick={openAdd}>+ 멤버 추가</Btn>
      )}
    </div>
  );
}

/* ── 코치 대시보드 ── */
function CoachDashboard({records,setRecords,categories,setCategories,apiKey,setApiKey,geminiModel,setGeminiModel}){
  const [tab,setTab]=useState("weekly");
  const [coachWriteDate,setCoachWriteDate]=useState(TODAY);
  const [showSettings,setShowSettings]=useState(false);
  const [showCatSettings,setShowCatSettings]=useState(false);
  const [saving,setSaving]=useState(false);
  const [apiDraft,setApiDraft]=useState("");
  const [modelDraft,setModelDraft]=useState(geminiModel);
  const weekDates=getLast7Days();

  const handleSaveRecord=async(date,rec)=>{
    try{
      await saveRecord(date,rec);
      setRecords(p=>({...p,[date]:rec}));
    }catch(e){alert("저장 실패: "+e.message);}
  };

  const handleSaveCategories=async cats=>{
    setSaving(true);
    try{
      await saveCategories(cats);
      setCategories(cats);
      setShowCatSettings(false);
    }catch(e){alert("저장 실패: "+e.message);}
    finally{setSaving(false);}
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:600}}>
          코치 대시보드
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowCatSettings(!showCatSettings)}
            style={{background:"var(--surface2)",border:"1px solid var(--border)",
              borderRadius:20,padding:"5px 12px",fontSize:12,color:"var(--text-mid)",cursor:"pointer"}}>
            카테고리
          </button>
          <button onClick={()=>setShowSettings(!showSettings)}
            style={{background:"var(--surface2)",border:"1px solid var(--border)",
              borderRadius:20,padding:"5px 12px",fontSize:12,color:"var(--text-mid)",cursor:"pointer"}}>
            설정
          </button>
        </div>
      </div>

      {showSettings&&(
        <Card style={{marginBottom:16,border:"1px solid var(--accent)"}}>
          <div style={{fontFamily:"var(--serif)",fontSize:17,marginBottom:16}}>설정</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:5,fontWeight:600}}>Gemini API 키</div>
            <div style={{display:"flex",gap:8}}>
              <input type="password" value={apiDraft} onChange={e=>setApiDraft(e.target.value)}
                placeholder={apiKey?"저장됨":"API 키 입력"}
                style={Object.assign({},iStyle,{flex:1})}/>
              <Btn size="sm" onClick={()=>{setApiKey(apiDraft);localStorage.setItem(GEMINI_KEY_LS,apiDraft);alert("저장됐어요!");}}>저장</Btn>
            </div>
            {apiKey&&<div style={{fontSize:11,color:"var(--ok)",marginTop:3}}>✓ 설정됨</div>}
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:5,fontWeight:600}}>Gemini 모델</div>
            <div style={{display:"flex",gap:8}}>
              <input value={modelDraft} onChange={e=>setModelDraft(e.target.value)}
                style={Object.assign({},iStyle,{flex:1})}/>
              <Btn size="sm" onClick={()=>{setGeminiModel(modelDraft);localStorage.setItem(GEMINI_MODEL_LS,modelDraft);alert("저장됐어요!");}}>저장</Btn>
            </div>
            <div style={{fontSize:11,color:"var(--text-dim)",marginTop:3}}>현재: {geminiModel}</div>
          </div>
          <div style={{fontSize:11,color:"var(--text-dim)",padding:"10px 14px",
            background:"var(--surface2)",borderRadius:8,marginBottom:12,lineHeight:1.7}}>
            필요 시트: <code style={{color:"var(--accent)"}}>work_records</code>, <code style={{color:"var(--accent)"}}>work_categories</code>
          </div>
          <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:12}}>
            CoachOS <span style={{color:"var(--accent)"}}>{VERSION}</span>
          </div>
          <Btn variant="ghost" onClick={()=>setShowSettings(false)}>닫기</Btn>
        </Card>
      )}

      {showCatSettings&&(
        <div style={{marginBottom:16}}>
          <CategorySettings categories={categories}
            onSave={handleSaveCategories}
            onClose={()=>setShowCatSettings(false)}
            saving={saving}/>
        </div>
      )}

      <div style={{display:"flex",borderBottom:"2px solid var(--border)",marginBottom:20}}>
        {[["weekly","주간 기록"],["write","직접 입력"],["members","멤버 관리"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{padding:"10px 20px",border:"none",background:"none",cursor:"pointer",
              fontSize:14,fontWeight:tab===k?600:400,
              color:tab===k?"var(--accent)":"var(--text-mid)",
              borderBottom:"2px solid "+(tab===k?"var(--accent)":"transparent"),marginBottom:-2}}>
            {l}
          </button>
        ))}
      </div>

      {tab==="weekly"&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <WeekTable records={records} dates={weekDates} categories={categories}
            onUpdate={handleSaveRecord} isReadOnly={false}/>
          <SetsChart records={records} dates={weekDates} categories={categories}/>
          {apiKey&&<AIWeeklyReport records={records} dates={weekDates}
            categories={categories} apiKey={apiKey} geminiModel={geminiModel}/>}
        </div>
      )}
      {tab==="write"&&(
        <RecordForm key={coachWriteDate} date={coachWriteDate}
          record={records[coachWriteDate]} categories={categories}
          onSave={handleSaveRecord}
          onDateChange={setCoachWriteDate}/>
      )}
      {tab==="members"&&(
        <MemberManager/>
      )}
    </div>
  );
}

/* ── 로그인 ── */
function Login({onLogin,loading}){
  const [name,setName]=useState("");
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [taps,setTaps]=useState(0);
  const [isCoach,setIsCoach]=useState(false);
  const [cpw,setCpw]=useState("");
  const [cerr,setCerr]=useState("");
  const [logging,setLogging]=useState(false);
  const tap=()=>{const n=taps+1;setTaps(n);if(n>=5){setIsCoach(true);setTaps(0);}};

  const doLogin=async()=>{
    if(logging)return;
    setLogging(true);
    try{await onLogin("member",name,pin,setErr);}
    finally{setLogging(false);}
  };
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",
      flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div onClick={tap} style={{fontFamily:"var(--serif)",fontSize:32,
          color:"var(--accent)",letterSpacing:2,cursor:"default",userSelect:"none",
          fontStyle:"italic"}}>
          CoachOS
        </div>
        <div style={{fontSize:13,color:"var(--text-dim)",marginTop:6}}>업무 트래킹 시스템</div>
      </div>
      {loading?<div style={{color:"var(--text-dim)"}}>불러오는 중…</div>:!isCoach?(
        <div style={{background:"var(--surface)",borderRadius:14,border:"1px solid var(--border)",
          padding:24,width:"100%",maxWidth:340,boxShadow:"0 1px 12px rgba(0,0,0,0.06)"}}>
          <div style={{fontWeight:600,fontSize:16,marginBottom:16}}>로그인</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:12,color:"var(--text-mid)",marginBottom:4}}>이름</div>
              <FInput value={name} onChange={setName} placeholder="이름을 입력하세요"/>
            </div>
            <div>
              <div style={{fontSize:12,color:"var(--text-mid)",marginBottom:4}}>PIN</div>
              <FInput value={pin} onChange={setPin} placeholder="PIN 번호" type="password"/>
            </div>
            {err&&<p style={{color:"var(--danger)",fontSize:12}}>{err}</p>}
            <Btn full onClick={doLogin} disabled={logging}
              style={{marginTop:4,padding:13}}>{logging?"로그인 중…":"로그인"}</Btn>
          </div>
        </div>
      ):(
        <div style={{background:"var(--surface)",borderRadius:14,border:"1px solid var(--border)",
          padding:24,width:"100%",maxWidth:340,boxShadow:"0 1px 12px rgba(0,0,0,0.06)"}}>
          <button onClick={()=>setIsCoach(false)}
            style={{background:"none",border:"none",cursor:"pointer",
              color:"var(--text-mid)",fontSize:13,marginBottom:16,padding:0}}>← 뒤로</button>
          <div style={{fontWeight:600,fontSize:16,marginBottom:16}}>코치 접속</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:12,color:"var(--text-mid)",marginBottom:4}}>비밀번호</div>
              <FInput value={cpw} onChange={setCpw} placeholder="코치 비밀번호" type="password"/>
            </div>
            {cerr&&<p style={{color:"var(--danger)",fontSize:12}}>{cerr}</p>}
            <Btn full onClick={()=>cpw===COACH_PW?onLogin("coach",null,null,setCerr):setCerr("비밀번호가 올바르지 않습니다.")}
              style={{marginTop:4,padding:13}}>접속</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [session,setSession]=useState(null);
  const [records,setRecords]=useState({});
  const [categories,setCategories]=useState(DEFAULT_CATEGORIES);
  const [loading,setLoading]=useState(true);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(GEMINI_KEY_LS)||"");
  const [geminiModel,setGeminiModel]=useState(()=>localStorage.getItem(GEMINI_MODEL_LS)||DEFAULT_MODEL);

  useEffect(()=>{
    (async()=>{
      try{
        const [recs,cats]=await Promise.all([loadRecords(),loadCategories()]);
        setRecords(recs);setCategories(cats);
      }catch(e){
        console.error("데이터 로드 실패:",e);
      }finally{setLoading(false);}
    })();
  },[]);

  const handleLogin=async(role,name,pin,setErr)=>{
    if(role==="coach"){setSession({role:"coach"});return;}
    if(!name.trim()){setErr("이름을 입력해주세요.");return;}
    if(!pin.trim()){setErr("PIN을 입력해주세요.");return;}
    try{
      const rows=await sheetGet("members");
      if(rows.length===0){
        setErr("등록된 멤버가 없어요. 코치에게 문의해주세요.");return;
      }
      const match=rows.find(r=>String(r[0]).trim()===name.trim()&&String(r[1]).trim()===pin.trim());
      if(!match){setErr("이름 또는 PIN이 올바르지 않습니다.");return;}
      setSession({role:"member",name:name.trim()});
    }catch(e){
      setErr("로그인 실패: "+e.message);
    }
  };

  const saveMyRecord=async(date,rec)=>{
    try{
      await saveRecord(date,rec);
      setRecords(p=>({...p,[date]:rec}));
    }catch(e){
      alert("저장 실패: "+e.message);
    }
  };

  if(!session)return<Login onLogin={handleLogin} loading={loading}/>;

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      {/* 헤더 */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",
        position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:760,margin:"0 auto",padding:"12px 20px",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"var(--serif)",fontSize:19,color:"var(--accent)",
            letterSpacing:1,fontStyle:"italic"}}>CoachOS</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {session.role==="member"&&<span style={{fontSize:13,color:"var(--text-mid)"}}>{session.name}님</span>}
            {session.role==="coach"&&(
              <span style={{fontSize:11,fontWeight:600,color:"var(--accent)",
                background:"var(--accent-l)",borderRadius:20,padding:"3px 10px",
                border:"1px solid var(--accent)"}}>코치</span>
            )}
            <Btn size="sm" variant="ghost" onClick={()=>setSession(null)}>로그아웃</Btn>
          </div>
        </div>
      </div>
      {/* 컨텐츠 */}
      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 20px 60px"}}>
        {loading?<Spinner/>:session.role==="coach"?(
          <CoachDashboard records={records} setRecords={setRecords}
            categories={categories} setCategories={setCategories}
            apiKey={apiKey} setApiKey={setApiKey}
            geminiModel={geminiModel} setGeminiModel={setGeminiModel}/>
        ):(
          <MyHome records={records} categories={categories}
            onSave={saveMyRecord} apiKey={apiKey} geminiModel={geminiModel}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
